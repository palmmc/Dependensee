title: Dependensee
description: A tool to help make maven version searching easier.
baseurl: "/Dependensee"
url: "https://palmmc.github.io"
markdown: kramdown
theme: minima
exclude:
  - node_modules
  - package.json
  - package-lock.json
  - tsconfig.json
  - vite.config.ts
  - scripts
  - src
  - dist
  - vendor
  - Gemfile
  - Gemfile.lock
include:
  - assets
check_gitignore: false
